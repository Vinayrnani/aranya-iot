[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

; Library dependencies
lib_deps =
    IRremoteESP8266
    FastLED

; Build flags
build_flags =
    -D NODEMCU
    -D ENABLE_IR
    -D ENABLE_RELAY
    -D ENABLE_LED
    -D ENABLE_ESPNOW

; Upload settings
upload_speed = 921600
upload_port = /dev/ttyUSB0

; Debug settings
debug_tool = esp-prog
debug_init_break = tbreak setup