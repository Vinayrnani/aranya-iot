name: CI Placeholder for Aranya IoT

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PlatformIO
        uses: platformio/setup-platformio@v1
        with:
          version: latest

      - name: Build firmware
        run: pio run

      - name: List build artifacts
        run: |
          find .pio/build -name "*.bin" -o -name "*.elf" -o -name "*.hex" | sort

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: |
            .pio/build/**/*.bin
            .pio/build/**/*.elf
            .pio/build/**/*.hex
          retention-days: 30

